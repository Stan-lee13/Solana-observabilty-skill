name: CI - Lint & Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli@0.33.0
      - name: Run markdownlint
        run: markdownlint-cli "**/*.md"

  yaml-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PyYAML
        run: python -m pip install pyyaml
      - name: Validate YAML syntax
        run: |
          python - <<'PY'
          import pathlib, yaml, sys

          failures = []
          for path in sorted(pathlib.Path('.').rglob('*.yml')) + sorted(pathlib.Path('.').rglob('*.yaml')):
              try:
                  yaml.safe_load(path.read_text())
              except Exception as exc:
                  print(f'YAML parse failed: {path}: {exc}')
                  failures.append(path)

          if failures:
              sys.exit(1)
          print('YAML validation passed.')
          PY

  json-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON syntax
        run: |
          python - <<'PY'
          import json, pathlib, sys

          failures = []
          for path in sorted(pathlib.Path('.').rglob('*.json')):
              try:
                  json.loads(path.read_text())
              except Exception as exc:
                  print(f'JSON parse failed: {path}: {exc}')
                  failures.append(path)

          if failures:
              sys.exit(1)
          print('JSON validation passed.')
          PY

  promtool-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install promtool
        run: |
          set -e
          ARCH=amd64
          TAG=$(curl -s https://api.github.com/repos/prometheus/prometheus/releases/latest | jq -r .tag_name)
          curl -sL "https://github.com/prometheus/prometheus/releases/download/${TAG}/prometheus-${TAG#v}.linux-${ARCH}.tar.gz" -o prometheus.tar.gz
          tar xzf prometheus.tar.gz
      - name: Run promtool check rules
        run: |
          if [ -d rules ]; then
            ./prometheus-*/promtool check rules rules
          else
            echo "No rules directory; skipping promtool check"
          fi

  terraform-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.6.0'
      - name: Detect Terraform files
        id: tffiles
        run: |
          count=$(find . -name '*.tf' | wc -l)
          echo "count=$count" >> $GITHUB_OUTPUT
      - name: Terraform fmt check
        if: steps.tffiles.outputs.count != '0'
        run: terraform fmt -check -recursive
      - name: Terraform plan
        if: steps.tffiles.outputs.count != '0'
        run: terraform init -backend=false && terraform plan -input=false -lock=false
