version: "3.8"

# =============================================================================
# Solana Observability Stack — Hardened Production Docker Compose
# =============================================================================
# Usage:
#   cp .env.example .env          # fill in your RPC URLs and credentials
#   docker compose up -d          # start the full stack
#   docker compose logs -f        # tail logs
#   docker compose down -v        # full teardown including volumes
#
# Ports exposed (change via .env):
#   3001 — solana-exporter  /metrics /health /live
#   9090 — prometheus       /graph
#   3000 — grafana          (login: admin / $GF_SECURITY_ADMIN_PASSWORD)
# =============================================================================

services:
  # ── Custom Solana metrics exporter ─────────────────────────────────────────
  solana-exporter:
    build:
      context: ./solana-exporter
      dockerfile: Dockerfile
    image: solana-observability-exporter:latest
    container_name: solana-exporter
    restart: unless-stopped
    ports:
      - "${EXPORTER_PORT:-3001}:3001"
    environment:
      # ── Required: at least one RPC endpoint
      - HELIUS_RPC_URL=${HELIUS_RPC_URL}
      - HELIUS_RPC_ALIAS=${HELIUS_RPC_ALIAS:-helius-primary}
      # ── Optional: additional RPC endpoints for failover
      - QUICKNODE_RPC_URL=${QUICKNODE_RPC_URL:-}
      - QUICKNODE_RPC_ALIAS=${QUICKNODE_RPC_ALIAS:-quicknode-backup}
      - TRITON_RPC_URL=${TRITON_RPC_URL:-}
      - TRITON_RPC_ALIAS=${TRITON_RPC_ALIAS:-triton-fallback}
      # ── Solana cluster (mainnet-beta | devnet | testnet)
      - SOLANA_CLUSTER=${SOLANA_CLUSTER:-mainnet-beta}
      # ── Scrape frequency (seconds, minimum 5)
      - SCRAPE_INTERVAL_SECONDS=${SCRAPE_INTERVAL_SECONDS:-15}
      # ── Addresses to monitor (comma-separated)
      - PROGRAM_IDS=${PROGRAM_IDS:-}
      - VAULT_ADDRESSES=${VAULT_ADDRESSES:-}
      - FEE_PAYER_ADDRESSES=${FEE_PAYER_ADDRESSES:-}
      - GOVERNANCE_MINTS=${GOVERNANCE_MINTS:-}
      - BRIDGE_MINTS=${BRIDGE_MINTS:-}
      - DEPIN_NODE_ADDRESSES=${DEPIN_NODE_ADDRESSES:-}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - observability

  # ── Prometheus — metrics collection + alert evaluation ─────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: solana-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    
  # Blackbox exporter — HTTP probes for synthetic monitoring (synthetic-monitoring.md)
  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    restart: unless-stopped
    ports:
      - "9115:9115"
    volumes:
      - ./blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - observability

  # Node exporter — host CPU/memory/disk metrics (infrastructure-monitoring.md)
  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - observability

  # Loki — log aggregation (logging-tracing.md)
  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks:
      - observability

  # Promtail — log shipper for Loki
  promtail:
    image: grafana/promtail:latest
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - ./promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - observability
    depends_on:
      - loki

volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}"
      - "--storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-10GB}"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
      - "--log.level=warn"
    depends_on:
      solana-exporter:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    networks:
      - observability

  # ── Grafana — dashboards + visualization ──────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: solana-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      # ⚠ CHANGE THIS BEFORE PRODUCTION USE — set via .env file
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?Set GF_SECURITY_ADMIN_PASSWORD in .env}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      # Security hardening
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_SECURITY_STRICT_TRANSPORT_SECURITY=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      # Performance
      - GF_DATABASE_WAL=true
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/solana-infrastructure.json
      # Alerting webhook (optional)
      - GF_ALERTING_ENABLED=true
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - PAGERDUTY_INTEGRATION_KEY=${PAGERDUTY_INTEGRATION_KEY:-}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    networks:
      - observability

  # ── Alertmanager — routing alerts to PagerDuty/Discord/Slack ──────────────
  # Enable by setting ALERTMANAGER_ENABLED=true and providing credentials
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: solana-alertmanager
    restart: unless-stopped
    profiles:
      - alertmanager  # docker compose --profile alertmanager up -d
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--log.level=warn"
    security_opt:
      - no-new-privileges:true
    networks:
      - observability

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local

networks:
  observability:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
