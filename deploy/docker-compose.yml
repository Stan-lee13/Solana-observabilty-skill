version: "3.8"

services:
  # Custom Solana metrics exporter
  solana-exporter:
    build:
      context: ./solana-exporter
      dockerfile: Dockerfile
    container_name: solana-exporter
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - HELIUS_RPC_URL=${HELIUS_RPC_URL:-https://api.mainnet-beta.solana.com}
      - QUICKNODE_RPC_URL=${QUICKNODE_RPC_URL:-}
      - PROGRAM_IDS=${PROGRAM_IDS:-} # Comma-separated program IDs to monitor
      - SCRAPE_INTERVAL_SECONDS=15
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus — metrics collection and evaluation
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: solana-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    depends_on:
      - solana-exporter

  # Grafana — dashboards and visualization
  grafana:
    image: grafana/grafana:10.4.0
    container_name: solana-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=solana-obs
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/solana-infrastructure.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
