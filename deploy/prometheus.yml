global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: "solana-mainnet"

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "solana-exporter"
    static_configs:
      - targets: ["solana-exporter:3001"]
    metrics_path: "/metrics"
    scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # Add alertmanager:9093 if using Alertmanager
