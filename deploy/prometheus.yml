# =============================================================================
# prometheus.yml — Solana Observability Stack
# =============================================================================
# Copy-pasteable production configuration.
# All sensitive values (API keys, bearer tokens) must use file-based secrets
# or environment variable expansion — never hardcoded in this file.
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  # External labels are attached to all metrics and alerts
  # Set these to match your environment
  external_labels:
    cluster: "${SOLANA_CLUSTER:-solana-mainnet}"
    environment: "${ENV:-production}"
    region: "${REGION:-us-east}"

# Alert rules file
rule_files:
  - "alerts.yml"

# Alertmanager configuration
# Uncomment and configure if using the alertmanager Docker Compose profile
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # Uncomment to enable:
          # - targets: ["alertmanager:9093"]
      # scheme: http
      # timeout: 10s
      # api_version: v2

scrape_configs:
  # ── Solana custom exporter ─────────────────────────────────────────────────
  - job_name: "solana-exporter"
    static_configs:
      - targets: ["solana-exporter:3001"]
        labels:
          service: "solana-exporter"
    metrics_path: "/metrics"
    scrape_interval: 15s
    scrape_timeout: 10s
    # Uncomment for bearer token auth if exporter is exposed externally:
    # authorization:
    #   credentials_file: /etc/prometheus/secrets/exporter-token

  # ── Prometheus self-monitoring ─────────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"
    scrape_interval: 30s

  # ── Grafana self-monitoring (optional) ────────────────────────────────────
  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          service: "grafana"
    metrics_path: "/metrics"
    scrape_interval: 60s

# ── Storage tuning notes ───────────────────────────────────────────────────
# Retention is set via CLI flags in docker-compose.yml:
#   --storage.tsdb.retention.time=30d
#   --storage.tsdb.retention.size=10GB
#
# For high-cardinality environments (>100 programs, >1000 nodes):
#   Increase retention.size to 50GB
#   Consider remote_write to Grafana Cloud or Thanos for long-term storage

  # Node exporter — host CPU/mem/disk metrics
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+).*'
        replacement: '$1'

  # Alertmanager self-monitoring
  - job_name: "alertmanager"
    static_configs:
      - targets: ["alertmanager:9093"]

  # Blackbox exporter — synthetic/canary HTTP probes
  - job_name: "blackbox-http"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - "${RPC_URL}/health"
          - "${INDEXER_HEALTH_URL}"
          - "${APP_HEALTH_URL}"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: "blackbox-exporter:9115"

  # Solana exporter — with explicit metric relabeling
  - job_name: "solana-exporter-labeled"
    static_configs:
      - targets: ["${EXPORTER_HOST:-solana-exporter}:9090"]
        labels:
          cluster: "${SOLANA_CLUSTER:-mainnet-beta}"
          protocol: "${PROTOCOL_NAME:-unknown}"
    metric_relabel_configs:
      # Drop high-cardinality per-tx metrics from long-term storage
      - source_labels: [__name__]
        regex: 'solana_tx_signature.*'
        action: drop
      # Normalize program IDs to short labels
      - source_labels: [program_id]
        target_label: program_short
        regex: '(.{8}).*'
        replacement: '$1...'
