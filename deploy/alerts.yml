groups:
  - name: solana-observability-critical
    interval: 30s
    rules:
      - alert: SolanaRPCDown
        expr: solana_rpc_healthy == 0
        for: 2m
        labels:
          severity: p1
          service: solana-rpc
          owner: protocol-ops
          slo: rpc-availability
          runbook_url: runbooks/rpc-degradation.md
          dashboard_url: grafana/d/solana-infrastructure
        annotations:
          summary: "RPC endpoint {{ $labels.endpoint }} is unhealthy"
          description: "Endpoint {{ $labels.endpoint }} has failed health probes for 2 minutes."

      - alert: SolanaRPCSlotLagHigh
        expr: solana_slot_lag_slots > 50
        for: 3m
        labels:
          severity: p1
          service: solana-rpc
          owner: protocol-ops
          slo: rpc-availability
          runbook_url: runbooks/rpc-degradation.md
          dashboard_url: grafana/d/solana-infrastructure
        annotations:
          summary: "RPC endpoint {{ $labels.endpoint }} slot lag is high"
          description: "Slot lag is {{ $value }} slots, above the 50-slot P1 threshold."

      - alert: SolanaRPCP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(solana_rpc_request_duration_seconds_bucket[5m])) by (le, endpoint)
          ) > 2.5
        for: 10m
        labels:
          severity: p2
          service: solana-rpc
          owner: protocol-ops
          slo: rpc-latency
          runbook_url: runbooks/rpc-degradation.md
          dashboard_url: grafana/d/solana-infrastructure
        annotations:
          summary: "RPC p95 latency high for {{ $labels.endpoint }}"
          description: "p95 getSlot latency is above 2.5s for 10 minutes."

      - alert: SolanaTxSuccessRateLow
        expr: |
          sum(rate(solana_transaction_total{status="failed"}[5m]))
          /
          clamp_min(sum(rate(solana_transaction_total[5m])), 1)
          > 0.10
        for: 5m
        labels:
          severity: p0
          service: solana-program
          owner: protocol-ops
          slo: transaction-success
          runbook_url: runbooks/transaction-success-rate-low.md
          dashboard_url: grafana/d/solana-program
        annotations:
          summary: "Transaction failure rate above 10%"
          description: "Critical transaction failure-rate threshold crossed for 5 minutes."

      - alert: SolanaErrorBudgetFastBurn
        expr: |
          (
            sum(rate(solana_transaction_total{status="failed"}[1h]))
            /
            clamp_min(sum(rate(solana_transaction_total[1h])), 1)
          ) / 0.005 > 2
        for: 30m
        labels:
          severity: p1
          service: solana-program
          owner: protocol-ops
          slo: transaction-success
          runbook_url: runbooks/transaction-success-rate-low.md
          dashboard_url: grafana/d/solana-program
        annotations:
          summary: "Transaction success error budget burning fast"
          description: "30-day 99.5% SLO burn rate is above 2x for 30 minutes."

      - alert: SolanaFeePayerLow
        expr: solana_fee_payer_balance_sol < 0.5
        for: 5m
        labels:
          severity: p1
          service: solana-program
          owner: protocol-ops
          slo: transaction-success
          runbook_url: runbooks/fee-payer-low.md
          dashboard_url: grafana/d/solana-program
        annotations:
          summary: "Fee payer balance low for {{ $labels.account_alias }}"
          description: "Fee payer has less than 0.5 SOL available."

      - alert: SolanaProgramUpgradeDetected
        expr: increase(solana_program_upgrade_detected_total[5m]) > 0
        for: 0m
        labels:
          severity: p0
          service: solana-program
          owner: protocol-security
          security: program-upgrade
          runbook_url: runbooks/program-upgrade-detected.md
          dashboard_url: grafana/d/solana-program
        annotations:
          summary: "Program upgrade detected for {{ $labels.program_id }}"
          description: "A monitored program emitted an upgrade/data hash change signal. Verify immediately."

      # ── Indexer ──────────────────────────────────────────────────────
      - alert: SolanaIndexerLagHigh
        expr: solana_indexer_lag_seconds > 300
        for: 3m
        labels:
          severity: warning
          runbook: runbooks/indexer-lag.md
        annotations:
          summary: "Indexer lag {{ $value | humanizeDuration }} on {{ $labels.job }}"
          description: "Indexer is {{ $value }}s behind chain head. User-facing balances and claims may be stale."
          runbook_url: "https://github.com/Stan-lee13/Solana-observabilty-skill/blob/main/runbooks/indexer-lag.md"

      # ── Wallet adapter ────────────────────────────────────────────────
      - alert: SolanaWalletErrorSpike
        expr: |
          sum(rate(solana_wallet_adapter_errors_total[5m])) /
          sum(rate(solana_wallet_adapter_requests_total[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
          runbook: runbooks/wallet-error-spike.md
        annotations:
          summary: "Wallet adapter error rate {{ $value | humanizePercentage }}"
          description: "More than 5% of wallet adapter calls are failing. Users may be unable to connect or sign."
          runbook_url: "https://github.com/Stan-lee13/Solana-observabilty-skill/blob/main/runbooks/wallet-error-spike.md"

      # ── Wallet drain (P0) ─────────────────────────────────────────────
      - alert: SolanaWalletDrainDetected
        expr: |
          increase(solana_unexpected_outflow_lamports_total[5m]) > 1000000000
        for: 0m
        labels:
          severity: critical
          runbook: runbooks/wallet-drain-detected.md
        annotations:
          summary: "CRITICAL: Unexpected wallet outflow > 1 SOL in 5 minutes"
          description: "Wallet {{ $labels.address }} has unexpected outflow of {{ $value | humanize }} lamports. Possible drain attack. IMMEDIATELY page Protocol Lead."
          runbook_url: "https://github.com/Stan-lee13/Solana-observabilty-skill/blob/main/runbooks/wallet-drain-detected.md"

      - alert: SolanaSetAuthoritySpike
        expr: increase(solana_set_authority_instruction_total[5m]) > 3
        for: 0m
        labels:
          severity: critical
          runbook: runbooks/wallet-drain-detected.md
        annotations:
          summary: "CRITICAL: Unusual authority-change instruction spike"
          description: "{{ $value }} setAuthority instructions in 5 minutes — possible drain or key rotation attack."

      # ── Wallet security (from wallet-observability.md) ────────────────
      - alert: SolanaKeystoreAlgoWeak
        expr: solana_keystore_algo_valid == 0
        for: 0m
        labels:
          severity: warning
          runbook: skill/wallet-observability.md
        annotations:
          summary: "Node {{ $labels.node_id }} keystore not using Argon2id"
          description: "Keystore KDF is weak. Rotate immediately using Argon2id with memoryCost>=65536, timeCost>=3."

      - alert: SolanaHDGapLimitRisk
        expr: solana_hd_gap_max_funded_index > 30
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "HD wallet funded accounts near gap limit (index {{ $value }})"
          description: "Operator {{ $labels.operator }} has funded accounts at index {{ $value }}. Standard restore tools may miss these accounts."

      - alert: SolanaAuthorityMismatch
        expr: solana_authority_mismatch == 1
        for: 1m
        labels:
          severity: critical
          runbook: runbooks/program-upgrade-detected.md
        annotations:
          summary: "Account {{ $labels.account }} authority does not match expected"
          description: "Authority on {{ $labels.account }} is not the expected Squads multisig. Investigate immediately."

      - alert: SolanaProgramDataHashChanged
        expr: increase(solana_program_data_hash_changes_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
          runbook: runbooks/program-upgrade-detected.md
        annotations:
          summary: "Program {{ $labels.program_id }} data hash changed"
          description: "Program binary changed — verify this was a planned deployment. If not, execute emergency runbook immediately."
